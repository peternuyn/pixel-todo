spring.application.name=studyfarm

# Server
server.port=8080

# Datasource (Postgres via docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/studyfarm
spring.datasource.username=studyfarm
spring.datasource.password=studyfarm

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL during dev (set to false for prod)
spring.jpa.show-sql=true

# URL (deployment)
cors.allowed-origins=http://localhost:3000