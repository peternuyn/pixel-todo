spring.application.name=studyfarm

# Server
server.port=8080

# Datasource (Postgres via docker-compose)
# Each value is ${ENV_VAR:default}. Spring reads the environment variable if it
# is set (e.g. inside Docker), otherwise falls back to the default after the
# colon (handy when you run locally with `./mvnw spring-boot:run`).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyfarm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:studyfarm}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:studyfarm}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL during dev (set to false for prod)
spring.jpa.show-sql=true

# URL (deployment)
# In production set CORS_ALLOWED_ORIGINS to your real frontend URL,
# e.g. https://app.leap-and-bound.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Gemini AI (the "/ai <question>" chat command)
# api-key has NO default: when GEMINI_API_KEY is unset it resolves to "", and the
# GeminiClient treats that as "not configured" and returns a friendly fallback instead
# of crashing. Get a key at https://aistudio.google.com (Get API key). Locally, export
# GEMINI_API_KEY in your shell before `./mvnw spring-boot:run` — never commit the key.
gemini.api-key=${GEMINI_API_KEY:}
# Swap to e.g. gemini-2.0-flash if your key doesn't have access to 2.5-flash.
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}