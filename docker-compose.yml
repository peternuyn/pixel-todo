services:
  postgres:
    image: postgres:16-alpine
    container_name: studyfarm-postgres
    environment:
      POSTGRES_DB: studyfarm
      POSTGRES_USER: studyfarm
      POSTGRES_PASSWORD: studyfarm
    ports:
      - "5432:5432"
    volumes:
      - studyfarm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyfarm -d studyfarm"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  studyfarm-pgdata:
