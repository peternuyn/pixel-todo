# Reverse-proxy config for the Spring Boot backend.
#
# server_name is "_" (a catch-all) so this works whether you reach the box by
# its sslip.io name or a real domain. The certificate path uses the fixed name
# "app" because certbot is run with "--cert-name app" (see init-letsencrypt.sh),
# so this file never has to be edited when the domain changes.

# WebSocket upgrade helper: maps the incoming Upgrade header to the right
# Connection header value. Needed for the STOMP "/ws" endpoint to work.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- Port 80: ACME challenge + redirect to HTTPS ----
server {
    listen 80;
    server_name _;

    # Let's Encrypt fetches a token from here to prove you control the host.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: bounce the browser up to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Port 443: terminate TLS, proxy to the backend ----
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app/privkey.pem;

    location / {
        proxy_pass http://backend:8080;

        # Pass the real client info through to Spring Boot.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (STOMP /ws) upgrade support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep idle WebSocket connections alive (default is only 60s).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
